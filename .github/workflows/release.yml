name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-linux:
    name: Build linux-${{ matrix.arch }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install arm64 cross-compiler
        if: matrix.arch == 'arm64'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "1"
        run: |
          mkdir -p dist
          if [ "${GOARCH}" = "arm64" ]; then
            export CC=aarch64-linux-gnu-gcc
          else
            export CC=gcc
          fi
          go build -trimpath -ldflags "-X main.appVersion=${GITHUB_REF_NAME}" -o dist/openppl .
          tar -C dist -czf "dist/openppl_${GOOS}_${GOARCH}.tar.gz" openppl

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: openppl_linux_${{ matrix.arch }}
          path: dist/openppl_linux_${{ matrix.arch }}.tar.gz

  build-darwin:
    name: Build darwin-${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "1"
          CC: clang
        run: |
          mkdir -p dist
          if [ "${GOARCH}" = "amd64" ]; then
            export CGO_CFLAGS="-arch x86_64"
            export CGO_LDFLAGS="-arch x86_64"
          fi
          go build -trimpath -ldflags "-X main.appVersion=${GITHUB_REF_NAME}" -o dist/openppl .
          tar -C dist -czf "dist/openppl_${GOOS}_${GOARCH}.tar.gz" openppl

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: openppl_darwin_${{ matrix.arch }}
          path: dist/openppl_darwin_${{ matrix.arch }}.tar.gz

  build-windows:
    name: Build windows-${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        shell: pwsh
        env:
          GOOS: windows
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          go build -trimpath -ldflags "-X main.appVersion=${env:GITHUB_REF_NAME}" -o dist/openppl.exe .
          Compress-Archive -Path dist/openppl.exe -DestinationPath "dist/openppl_${env:GOOS}_${env:GOARCH}.zip" -Force

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: openppl_windows_${{ matrix.arch }}
          path: dist/openppl_windows_${{ matrix.arch }}.zip

  release:
    name: Publish GitHub release assets
    runs-on: ubuntu-24.04
    needs: [build-linux, build-darwin, build-windows]
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Validate build outputs and generate checksums
        run: |
          set -euo pipefail
          ls -lah dist
          tar_count="$(find dist -maxdepth 1 -name 'openppl_*.tar.gz' | wc -l | tr -d ' ')"
          zip_count="$(find dist -maxdepth 1 -name 'openppl_*.zip' | wc -l | tr -d ' ')"
          if [ "$tar_count" -ne 4 ]; then
            echo "Expected 4 tarballs, found $tar_count"
            exit 1
          fi
          if [ "$zip_count" -ne 2 ]; then
            echo "Expected 2 zip files, found $zip_count"
            exit 1
          fi
          cd dist
          sha256sum openppl_*.tar.gz openppl_*.zip > checksums.txt

      - name: Create release if missing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" -R "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release $tag already exists"
          else
            gh release create "$tag" \
              -R "${GITHUB_REPOSITORY}" \
              --title "openppl $tag" \
              --notes "Automated release for $tag"
          fi

      - name: Upload assets to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          gh release upload "$tag" -R "${GITHUB_REPOSITORY}" dist/openppl_*.tar.gz dist/openppl_*.zip dist/checksums.txt --clobber

      - name: Verify release assets are downloadable
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          for file in \
            openppl_linux_amd64.tar.gz \
            openppl_linux_arm64.tar.gz \
            openppl_darwin_amd64.tar.gz \
            openppl_darwin_arm64.tar.gz \
            openppl_windows_amd64.zip \
            openppl_windows_arm64.zip \
            checksums.txt
          do
            url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}/${file}"
            echo "Checking ${url}"
            curl -fsSIL "$url" >/dev/null
          done
